name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Placeholder env vars so `next build` and zod validation don't fail
      # on PRs. These are NOT the real keys — they just satisfy the schema.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + typecheck
        run: pnpm lint

      - name: Test
        run: pnpm test --if-present --passWithNoTests

      - name: Build
        run: pnpm build
